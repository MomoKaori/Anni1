<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Câu Hỏi Tình Yêu 💕</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #f8b5d4;
            --accent-color: #ff6b9d;
            --text-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .heart-icon {
            color: var(--accent-color);
            font-size: 3rem;
            margin-bottom: 20px;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }

        .question {
            font-size: 1.5rem;
            color: var(--text-color);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-yes {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
        }

        .btn-yes:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.3);
        }

        .btn-no {
            background: linear-gradient(45deg, #f44336, #da190b);
            color: white;
        }

        .btn-no:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(244, 67, 54, 0.3);
        }

        .reason-form {
            display: none;
            text-align: left;
            margin-top: 20px;
        }

        .reason-form.active {
            display: block;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-color);
        }

        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
        }

        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-submit {
            background: linear-gradient(45deg, var(--primary-color), var(--accent-color));
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(248, 181, 212, 0.3);
        }

        .btn-cancel {
            background: #ccc;
            color: #666;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-cancel:hover {
            background: #bbb;
        }

        .result-message {
            display: none;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            animation: slideIn 0.5s ease-out;
        }

        .result-message.active {
            display: block;
        }

        .result-message.rejected {
            background: linear-gradient(45deg, #ffebee, #ffcdd2);
            border: 2px solid #f44336;
        }

        .result-message.accepted {
            background: linear-gradient(45deg, #e8f5e8, #c8e6c9);
            border: 2px solid #4CAF50;
        }

        .back-btn {
            background: linear-gradient(45deg, var(--primary-color), var(--accent-color));
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            margin-top: 20px;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(248, 181, 212, 0.3);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <i class="fas fa-heart heart-icon"></i>
        
        <h1 class="question">
            Đã trải qua 1 năm với nhau rồi,<br>
            liệu anh có muốn cùng em viết tiếp câu chuyện tình này không?
        </h1>

        <div class="buttons" id="questionButtons">
            <button class="btn btn-yes" onclick="answerQuestion('yes')">
                <i class="fas fa-heart mr-2"></i>Có! 💕
            </button>
            <button class="btn btn-no" onclick="answerQuestion('no')">
                <i class="fas fa-question mr-2"></i>Không 🤔
            </button>
        </div>

        <div class="reason-form" id="reasonForm">
            <div class="form-group">
                <label for="reason">
                    <i class="fas fa-pen mr-2"></i>
                    Anh có thể chia sẻ lý do tại sao không?
                </label>
                <textarea id="reason" placeholder="Em muốn nghe thật lòng từ anh..."></textarea>
            </div>
            <div class="form-buttons">
                <button class="btn-cancel" onclick="cancelReason()">
                    <i class="fas fa-times mr-2"></i>Hủy
                </button>
                <button class="btn-submit" onclick="submitReason()">
                    <i class="fas fa-paper-plane mr-2"></i>Gửi đi
                </button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Đang xử lý câu trả lời của anh...</p>
        </div>

        <div class="result-message" id="resultMessage">
            <!-- Result will be loaded here -->
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBhZKjY8x3F2Q7rT6mN5p8sL9vW2xR3y4c",
            authDomain: "anni1-29547.firebaseapp.com",
            projectId: "anni1-29547",
            storageBucket: "anni1-29547.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abc123def456ghi789"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function goBack() {
            window.location.href = 'memories.html';
        }

        function answerQuestion(answer) {
            if (answer === 'yes') {
                // Save yes answer and show happy result
                saveAnswer('yes', null);
            } else if (answer === 'no') {
                // Show reason form
                document.getElementById('questionButtons').style.display = 'none';
                document.getElementById('reasonForm').classList.add('active');
            }
        }

        function cancelReason() {
            document.getElementById('reasonForm').classList.remove('active');
            document.getElementById('questionButtons').style.display = 'flex';
            document.getElementById('reason').value = '';
        }

        function submitReason() {
            const reason = document.getElementById('reason').value.trim();
            
            if (!reason) {
                alert('Vui lòng chia sẻ lý do của anh!');
                return;
            }

            // Hide form and show loading
            document.getElementById('reasonForm').classList.remove('active');
            document.getElementById('loading').classList.add('active');

            // Save no answer with reason
            saveAnswer('no', reason);
        }

        function saveAnswer(answer, reason) {
            const answerData = {
                answer: answer,
                reason: reason,
                timestamp: new Date().toISOString(),
                date: new Date().toLocaleDateString('vi-VN'),
                time: new Date().toLocaleTimeString('vi-VN')
            };

            // Add to loveAnswers collection
            db.collection('loveAnswers').add(answerData)
                .then((docRef) => {
                    console.log('Answer saved with ID:', docRef.id);
                    
                    // Simulate processing time
                    setTimeout(() => {
                        showResult(answer, reason);
                    }, 2000);
                })
                .catch((error) => {
                    console.error('Error saving answer:', error);
                    alert('Không thể lưu câu trả lời. Vui lòng thử lại!');
                    document.getElementById('loading').classList.remove('active');
                    document.getElementById('questionButtons').style.display = 'flex';
                });
        }

        function showResult(answer, reason) {
            document.getElementById('loading').classList.remove('active');
            const resultDiv = document.getElementById('resultMessage');
            
            if (answer === 'yes') {
                resultDiv.className = 'result-message accepted active';
                resultDiv.innerHTML = `
                    <div class="text-center">
                        <i class="fas fa-heart text-4xl text-green-500 mb-3"></i>
                        <h3 class="text-xl font-bold text-green-700 mb-2">Tuyệt vời! 💕</h3>
                        <p class="text-gray-700 mb-4">
                            Anh cũng muốn cùng em viết tiếp câu chuyện tình yêu này!<br>
                            Cảm ơn anh vì đã chọn em. Yêu anh rất nhiều! ❤️
                        </p>
                        <button class="btn-submit" onclick="goBack()">
                            <i class="fas fa-arrow-left mr-2"></i>Xem lại
                        </button>
                    </div>
                `;
            } else {
                resultDiv.className = 'result-message rejected active';
                resultDiv.innerHTML = `
                    <div class="text-center">
                        <i class="fas fa-hourglass-half text-4xl text-yellow-500 mb-3"></i>
                        <h3 class="text-xl font-bold text-yellow-700 mb-2">Lý do đang được xử lý ⏳</h3>
                        <div class="text-left bg-white p-4 rounded-lg mb-3">
                            <p class="text-sm text-gray-600 mb-2">Lý do anh chia sẻ:</p>
                            <p class="text-gray-800 italic">"${reason}"</p>
                        </div>
                        <p class="text-gray-700 mb-4">
                            Cảm ơn anh đã kiên nhẫn chia sẻ.<br>
                            Em đang suy nghĩ về lời nói của anh. Hãy cho em chút thời gian nhé! 🌟
                        </p>
                        <button class="btn-submit" onclick="goBack()">
                            <i class="fas fa-arrow-left mr-2"></i>Quay lại memories
                        </button>
                    </div>
                `;
            }

            // Update notification status in memories
            updateNotificationStatus();
        }

        function updateNotificationStatus() {
            // Mark this question as answered
            localStorage.setItem('loveQuestionAnswered', 'true');
            localStorage.setItem('loveQuestionDate', new Date().toISOString());
        }
    </script>
</body>
</html>
